name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run verification kit tests
        run: |
          cd experiments/verification-kit/scripts
          python test-report.py

      - name: Check prompt compliance
        run: |
          cd experiments/verification-kit/prompts
          test -f baseline-prompt.md
          test -f mb-protocol-prompt.md
          grep -q "MANDATORY" mb-protocol-prompt.md
          grep -q "BLOCKING" mb-protocol-prompt.md
          grep -q "CHECKPOINT" mb-protocol-prompt.md
